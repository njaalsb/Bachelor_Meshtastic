<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>RangeTest seq – kart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .panel {
      position: absolute; top: 12px; left: 12px; z-index: 999;
      background: white; padding: 10px 12px; border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 520px;
    }
    .muted { color: #666; font-size: 13px; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    select { padding: 6px 8px; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 6px 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    code { background:#f3f3f3; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="panel">
    <div><strong>RangeTest: seq X (sender ↔ mottaker)</strong></div>
    <div class="muted">Rader: <span id="nrows"></span></div>
    <div class="muted">Basestasjon (ref): 63.418430, 10.401481</div>
    <div style="margin-top:8px;" class="row">
      <label for="seqSel" class="muted">Velg:</label>
      <select id="seqSel"></select>
      <button id="prevBtn">←</button>
      <button id="nextBtn">→</button>
      <button id="allBtn">Vis alle</button>
    </div>
    <div class="muted" id="info" style="margin-top:6px;"></div>
  </div>

  <div id="map"></div>

<script>
  const BASE = [63.4184304, 10.4014815];
  const rows = [{"seq": 1, "date": "02/03/2026", "time": "15:15:47", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183866, "sender_lon": 10.399275, "rx_lat": 63.41832, "rx_lon": 10.3993283, "rx_snr": 10.75, "distance_m": 8.0, "hop_limit": "0"}, {"seq": 2, "date": "02/03/2026", "time": "15:15:53", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4126336, "sender_lon": 10.4071168, "rx_lat": 63.41832, "rx_lon": 10.3993283, "rx_snr": 12.0, "distance_m": 742.0, "hop_limit": "0"}, {"seq": 3, "date": "02/03/2026", "time": "15:16:08", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4126336, "sender_lon": 10.4071168, "rx_lat": 63.4182916, "rx_lon": 10.3991616, "rx_snr": 11.25, "distance_m": 743.0, "hop_limit": "0"}, {"seq": 4, "date": "02/03/2026", "time": "15:16:23", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183766, "sender_lon": 10.3992683, "rx_lat": 63.4182916, "rx_lon": 10.3991616, "rx_snr": 11.0, "distance_m": 11.0, "hop_limit": "0"}, {"seq": 5, "date": "02/03/2026", "time": "15:16:37", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183766, "sender_lon": 10.3992683, "rx_lat": 63.4182916, "rx_lon": 10.3991616, "rx_snr": 11.5, "distance_m": 11.0, "hop_limit": "0"}, {"seq": 6, "date": "02/03/2026", "time": "15:16:53", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183616, "sender_lon": 10.399305, "rx_lat": 63.4183166, "rx_lon": 10.3993083, "rx_snr": 10.5, "distance_m": 5.0, "hop_limit": "0"}, {"seq": 7, "date": "02/03/2026", "time": "15:17:08", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183616, "sender_lon": 10.399305, "rx_lat": 63.4183166, "rx_lon": 10.3993083, "rx_snr": 11.25, "distance_m": 5.0, "hop_limit": "0"}, {"seq": 8, "date": "02/03/2026", "time": "15:17:24", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183616, "sender_lon": 10.399305, "rx_lat": 63.4183183, "rx_lon": 10.3993616, "rx_snr": 8.75, "distance_m": 6.0, "hop_limit": "0"}, {"seq": 9, "date": "02/03/2026", "time": "15:17:52", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183266, "sender_lon": 10.3993416, "rx_lat": 63.4183183, "rx_lon": 10.3993616, "rx_snr": 10.25, "distance_m": 1.0, "hop_limit": "0"}, {"seq": 10, "date": "02/03/2026", "time": "15:18:08", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.418475, "sender_lon": 10.399205, "rx_lat": 63.418205, "rx_lon": 10.3994983, "rx_snr": 11.25, "distance_m": 33.0, "hop_limit": "0"}, {"seq": 11, "date": "02/03/2026", "time": "15:18:23", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.418475, "sender_lon": 10.399205, "rx_lat": 63.418205, "rx_lon": 10.3994983, "rx_snr": 10.5, "distance_m": 33.0, "hop_limit": "0"}, {"seq": 13, "date": "02/03/2026", "time": "15:18:52", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.41856, "sender_lon": 10.39912, "rx_lat": 63.418235, "rx_lon": 10.3997683, "rx_snr": 7.5, "distance_m": 48.0, "hop_limit": "0"}, {"seq": 14, "date": "02/03/2026", "time": "15:19:07", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.41856, "sender_lon": 10.39912, "rx_lat": 63.418235, "rx_lon": 10.3997683, "rx_snr": 5.5, "distance_m": 48.0, "hop_limit": "0"}, {"seq": 15, "date": "02/03/2026", "time": "15:19:23", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.41856, "sender_lon": 10.39912, "rx_lat": 63.4183116, "rx_lon": 10.4000216, "rx_snr": 6.75, "distance_m": 53.0, "hop_limit": "0"}, {"seq": 16, "date": "02/03/2026", "time": "15:19:37", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.418565, "sender_lon": 10.3993033, "rx_lat": 63.4183116, "rx_lon": 10.4000216, "rx_snr": 8.25, "distance_m": 46.0, "hop_limit": "0"}, {"seq": 17, "date": "02/03/2026", "time": "15:19:52", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.418565, "sender_lon": 10.3993033, "rx_lat": 63.4183116, "rx_lon": 10.4000216, "rx_snr": 12.25, "distance_m": 46.0, "hop_limit": "0"}, {"seq": 18, "date": "02/03/2026", "time": "15:20:11", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183516, "sender_lon": 10.3993816, "rx_lat": 63.4182616, "rx_lon": 10.3998283, "rx_snr": 11.75, "distance_m": 24.0, "hop_limit": "0"}, {"seq": 19, "date": "02/03/2026", "time": "15:20:22", "from": "363634937", "sender_name": "Meshtastic a0f9", "sender_lat": 63.4183516, "sender_lon": 10.3993816, "rx_lat": 63.4182616, "rx_lon": 10.3998283, "rx_snr": 12.25, "distance_m": 24.0, "hop_limit": "0"}];
  document.getElementById("nrows").textContent = rows.length;

  const map = L.map("map").setView([63.418039005555556, 10.39983826111111], 16);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  const houseIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/25/25694.png",
    iconSize: [28, 28],
    iconAnchor: [14, 28]
  });

  L.marker(BASE, {icon: houseIcon})
    .addTo(map)
    .bindPopup("<b>Basestasjon</b><br/>(" + BASE[0].toFixed(6) + ", " + BASE[1].toFixed(6) + ")");

  const nodeColors = {};
  function colorFor(nodeId) {
    if (!nodeColors[nodeId]) {
      nodeColors[nodeId] = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
    }
    return nodeColors[nodeId];
  }

  let activeLayers = [];
  function clearLayers() {
    for (const l of activeLayers) map.removeLayer(l);
    activeLayers = [];
  }

  function popupHtml(r) {
    const when = (r.date + " " + r.time).trim();
    const snr = (r.rx_snr ?? "");
    const dist = (r.distance_m ?? "");
    return `
      <div style="font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;">
        <div><b>${r.sender_name || r.from}</b> <span style="color:#666;">(${r.from})</span></div>
        <div style="color:#666;">${when}</div>
        <hr/>
        <div><b>seq</b>: ${r.seq}</div>
        <div>SNR: <b>${snr}</b></div>
        <div>distance(m): <b>${dist}</b></div>
        <div>hop limit: <b>${r.hop_limit}</b></div>
        <div style="margin-top:6px; color:#666;">
          sender: ${r.sender_lat.toFixed(6)}, ${r.sender_lon.toFixed(6)}<br/>
          rx: ${r.rx_lat.toFixed(6)}, ${r.rx_lon.toFixed(6)}
        </div>
      </div>
    `;
  }

  function drawOne(r) {
    clearLayers();
    const c = colorFor(r.from);

    const sender = [r.sender_lat, r.sender_lon];
    const rx = [r.rx_lat, r.rx_lon];

    const senderMarker = L.circleMarker(sender, {
      radius: 7, color: c, fillColor: c, fillOpacity: 0.25, weight: 2
    }).addTo(map).bindPopup(popupHtml(r) + "<div style='margin-top:6px;'><b>Type:</b> sender</div>");

    const rxMarker = L.circleMarker(rx, {
      radius: 9, color: c, fillColor: c, fillOpacity: 0.75, weight: 2
    }).addTo(map).bindPopup(popupHtml(r) + "<div style='margin-top:6px;'><b>Type:</b> rx</div>");

    const line = L.polyline([sender, rx], { color: c, weight: 3, opacity: 0.6 }).addTo(map);

    activeLayers.push(senderMarker, rxMarker, line);

    const b = L.latLngBounds([sender, rx, BASE]);
    map.fitBounds(b, { padding: [40, 40] });

    document.getElementById("info").innerHTML =
      `Viser <b>seq ${r.seq}</b> · ${r.date} ${r.time} · node: <code>${r.from}</code>`;
  }

  function drawAll() {
    clearLayers();
    const b = L.latLngBounds([BASE]);

    for (const r of rows) {
      const c = colorFor(r.from);
      const sender = [r.sender_lat, r.sender_lon];
      const rx = [r.rx_lat, r.rx_lon];

      const senderMarker = L.circleMarker(sender, {
        radius: 4, color: c, fillColor: c, fillOpacity: 0.2, weight: 2
      }).addTo(map).bindPopup(popupHtml(r) + "<div style='margin-top:6px;'><b>Type:</b> sender</div>");

      const rxMarker = L.circleMarker(rx, {
        radius: 6, color: c, fillColor: c, fillOpacity: 0.7, weight: 2
      }).addTo(map).bindPopup(popupHtml(r) + "<div style='margin-top:6px;'><b>Type:</b> rx</div>");

      const line = L.polyline([sender, rx], { color: c, weight: 2, opacity: 0.25 }).addTo(map);

      activeLayers.push(senderMarker, rxMarker, line);
      b.extend(sender); b.extend(rx);
    }

    map.fitBounds(b, { padding: [40, 40] });
    document.getElementById("info").innerHTML = `Viser <b>alle</b> seq (${rows.length})`;
  }

  // Dropdown
  const sel = document.getElementById("seqSel");
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = "seq " + r.seq + " (" + r.time + ")";
    sel.appendChild(opt);
  }

  function currentIndex() { return parseInt(sel.value || "0", 10); }
  function setIndex(i) {
    i = Math.max(0, Math.min(rows.length - 1, i));
    sel.value = String(i);
    drawOne(rows[i]);
  }

  sel.addEventListener("change", () => setIndex(currentIndex()));
  document.getElementById("prevBtn").addEventListener("click", () => setIndex(currentIndex() - 1));
  document.getElementById("nextBtn").addEventListener("click", () => setIndex(currentIndex() + 1));
  document.getElementById("allBtn").addEventListener("click", () => drawAll());

  setIndex(0);
</script>
</body>
</html>
